# ─── API proxy → Render backend ───────────────────────────────────────────────
[[redirects]]
  from   = "/api/*"
  to     = "https://ai-study-planner-h7ij.onrender.com/api/:splat"
  status = 200
  force  = true

# Google OAuth — only proxy the AUTHORIZATION start, not the callback
[[redirects]]
  from   = "/oauth2/authorization/*"
  to     = "https://ai-study-planner-h7ij.onrender.com/oauth2/authorization/:splat"
  status = 301
  force  = true


# ─── SPA fallback — MUST be last ──────────────────────────────────────────────
# /oauth2/callback?token=... will fall through to here and React handles it
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200