server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    location /api/ {
        proxy_pass https://ai-study-planner-backend-1zsa.onrender.com/api/;
        proxy_http_version 1.1;
        proxy_set_header Host ai-study-planner-backend-1zsa.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }
    location /oauth2/authorization/ {
        proxy_pass https://ai-study-planner-backend-1zsa.onrender.com/oauth2/authorization/;
        proxy_http_version 1.1;
        proxy_set_header Host ai-study-planner-backend-1zsa.onrender.com;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }
    location /login/oauth2/ {
        proxy_pass https://ai-study-planner-backend-1zsa.onrender.com/login/oauth2/;
        proxy_http_version 1.1;
        proxy_set_header Host ai-study-planner-backend-1zsa.onrender.com;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }
    location / {
        try_files $uri $uri/ /index.html;
    }
}