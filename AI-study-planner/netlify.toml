# Handle OAuth2 callback — serve React app (MUST be first)
[[redirects]]
  from   = "/oauth2/callback"
  to     = "/index.html"
  status = 200

# Proxy authorization start to Render
[[redirects]]
  from   = "/oauth2/authorization/*"
  to     = "https://ai-study-planner-h7ij.onrender.com/oauth2/authorization/:splat"
  status = 301
  force  = true

# API proxy
[[redirects]]
  from   = "/api/*"
  to     = "https://ai-study-planner-h7ij.onrender.com/api/:splat"
  status = 200
  force  = true

# SPA fallback — MUST be last
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200